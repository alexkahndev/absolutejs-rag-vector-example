<!doctype html>
<html lang="en">
  <head>
    <title>AbsoluteJS AI Chat - HTML</title>
    <meta
      name="description"
      content="AI streaming demo with HTML, powered by AbsoluteJS."
    />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/assets/ico/favicon.ico" />
    <link
      rel="stylesheet"
      type="text/css"
      href="../../styles/indexes/chat.css"
    />
  </head>

  <body>
    <header>
      <a href="/html" class="logo">
        <img
          src="/assets/png/absolutejs-temp.png"
          height="24"
          alt="AbsoluteJS"
        />
        AbsoluteJS
      </a>
      <nav>
        <a href="/">React</a>
        <a href="/svelte">Svelte</a>
        <a href="/vue">Vue</a>
        <a href="/angular">Angular</a>
        <a href="/html" class="active">HTML</a>
        <a href="/htmx">HTMX</a>
      </nav>
    </header>

    <div class="chat-container">
      <div class="selector-row">
        <div class="provider-selector">
          <button class="active" data-provider="anthropic" type="button">
            anthropic
          </button>
          <button data-provider="openai" type="button">openai</button>
          <button data-provider="ollama" type="button">ollama</button>
        </div>
        <div class="model-selector" id="model-selector"></div>
      </div>

      <div class="messages" id="messages">
        <div class="empty-state">
          Send a message to start chatting. Try "What do you have under $50?"
        </div>
      </div>

      <form class="chat-form" id="chat-form">
        <input
          autocomplete="off"
          name="input"
          placeholder="Ask claude-sonnet-4-6..."
        />
        <button type="submit">Send</button>
      </form>
    </div>

    <p class="footer">
      <img src="/assets/png/absolutejs-temp.png" alt="" />
      Powered by
      <a href="https://absolutejs.com" target="_blank" rel="noopener noreferrer"
        >AbsoluteJS</a
      >
    </p>

    <script src="../scripts/chat.ts"></script>
  </body>
</html>
